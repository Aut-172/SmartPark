spring:
  application:
    name: SmartPark
  datasource:
    url: jdbc:mysql://localhost:3306/smart_park?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: your-username
    password: your-password
    driver-class-name: com.mysql.cj.jdbc.Driver

    jackson:
      date-format: yyyy-MM-dd HH:mm:ss
      time-zone: GMT+8

  # MyBatis-Plus??
  mybatis-plus:
    configuration:
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # ?????SQL??
    global-config:
      db-config:
        logic-delete-field: deleted # ????????
        id-type: auto # ????

  # JWT??
  jwt:
    key: your-secret-key-must-be-at-least-32-chars-long  # ??
    ttl: 86400000
    issuer: your-name
